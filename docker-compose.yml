version: '3.8'

services:

  mysql:
    image: mysql:8.4
    container_name: orivex-mysql

    environment:
      MYSQL_ROOT_PASSWORD: Muskan@2021#
      MYSQL_DATABASE: orivex

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .

    container_name: orivex-backend

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/orivex
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Muskan@2021#

volumes:
  mysql_data: