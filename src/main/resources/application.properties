spring.application.name=orivex-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/orivex}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Muskan@2021#}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080



# Show SQL in logs
logging.level.org.hibernate.SQL=DEBUG

# Show parameter values
logging.level.org.hibernate.orm.jdbc.bind=TRACE

jwt.secret=MyVeryLongSecretKeyForDevelopmentOnlyChangeInProduction123456789
jwt.expiration=86400000